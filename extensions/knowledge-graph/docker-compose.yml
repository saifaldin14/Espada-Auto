# ──────────────────────────────────────────────────────────────────────────────
# Infrastructure Knowledge Graph — Docker Compose
#
# Profiles:
#   default     — SQLite-backed API server (zero external deps)
#   postgres    — PostgreSQL-backed API server (production)
#   full        — API + Postgres + Grafana dashboards
#
# Usage:
#   docker compose up                          # SQLite mode
#   docker compose --profile postgres up       # With PostgreSQL
#   docker compose --profile full up           # Everything
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ─── Infrastructure Graph API Server ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: infra-graph:latest
    container_name: infra-graph-api
    restart: unless-stopped
    ports:
      - "${INFRA_GRAPH_PORT:-8080}:8080"
    volumes:
      - infra-data:/data
    environment:
      - NODE_ENV=production
      - INFRA_GRAPH_DB=/data/infra.db
      - INFRA_GRAPH_HOST=0.0.0.0
      - INFRA_GRAPH_PORT=8080
      - INFRA_GRAPH_API_KEY=${INFRA_GRAPH_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

  # ─── PostgreSQL Backend ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: infra-graph-postgres
    profiles: ["postgres", "full"]
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-infra_graph}
      POSTGRES_USER: ${POSTGRES_USER:-infra_graph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infra_graph}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── API Server (Postgres mode) ────────────────────────────────────────
  api-postgres:
    build:
      context: .
      dockerfile: Dockerfile
    image: infra-graph:latest
    container_name: infra-graph-api-pg
    profiles: ["postgres", "full"]
    restart: unless-stopped
    ports:
      - "${INFRA_GRAPH_PORT:-8080}:8080"
    environment:
      - NODE_ENV=production
      - INFRA_GRAPH_HOST=0.0.0.0
      - INFRA_GRAPH_PORT=8080
      - INFRA_GRAPH_API_KEY=${INFRA_GRAPH_API_KEY:-}
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-infra_graph}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-infra_graph}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    command: ["serve", "--port", "8080", "--host", "0.0.0.0", "--postgres", "postgresql://${POSTGRES_USER:-infra_graph}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-infra_graph}"]
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  # ─── Grafana (Dashboards) ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: infra-graph-grafana
    profiles: ["full"]
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false

volumes:
  infra-data:
    driver: local
  pg-data:
    driver: local
  grafana-data:
    driver: local
